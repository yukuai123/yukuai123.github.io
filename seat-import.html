<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>座位安排（导入）</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script src="xlsx.full.min.js"></script>
    <style>
      body {
        font-family: "Microsoft YaHei", sans-serif;
        text-align: center;
        padding: 18px;
      }
      h2 {
        margin: 10px 0 14px;
        color: #111;
      }
      .import-bar {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
        align-items: center;
      }
      .import-bar label {
        padding: 8px 14px;
        border-radius: 6px;
        background: #1a4ea0;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
      }
      .import-bar input[type="file"] {
        display: none;
      }
      .toolbar {
        margin-bottom: 12px;
      }
      button {
        padding: 8px 14px;
        margin-right: 8px;
        border: 0;
        border-radius: 6px;
        background: #1a4ea0;
        color: #fff;
        cursor: pointer;
      }
      button.secondary {
        background: #666;
      }
      #title-input {
        font-size: 18px;
        font-weight: 700;
        border: none;
        border-bottom: 2px dashed #aaa;
        text-align: center;
        outline: none;
        margin-bottom: 14px;
        width: 260px;
      }
      .classroom {
        display: flex;
        justify-content: center;
        gap: 28px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .group {
        min-width: 260px;
        border: 2px solid #222;
        padding: 10px;
        border-radius: 6px;
        background: #fff;
      }
      .group.over {
        outline: 3px dashed #e8a000;
      }
      .group-title {
        font-weight: 700;
        margin-bottom: 8px;
        text-align: center;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 120px);
        grid-auto-rows: auto;
        gap: 8px;
        justify-content: center;
      }
      .student {
        border: 1px solid #222;
        border-radius: 6px;
        padding: 6px;
        display: flex;
        flex-direction: column;
        font-size: 13px;
        cursor: grab;
        user-select: none;
        background: #f0f4ff;
      }
      .student.male {
        background: #e6f3ff;
      }
      .student.female {
        background: #fff0f6;
      }
      .student.dragging {
        opacity: 0.45;
      }
      .student.over {
        outline: 3px dashed #1a4ea0;
      }
      .info {
        font-weight: 700;
      }
      .sub {
        font-size: 12px;
        color: #333;
        margin-top: 2px;
      }
      .tag-container {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }
      .tag-item {
        display: flex;
        align-items: center;
        gap: 3px;
        padding: 2px 6px;
        font-size: 11px;
        border-radius: 12px;
        background: #1a73e8;
        color: #fff;
      }
      .tag-item .remove {
        cursor: pointer;
      }
      .tag-input {
        font-size: 11px;
        padding: 2px 6px;
        min-width: 30px;
        border: 1px dashed #aaa;
        border-radius: 12px;
        outline: none;
      }
      #empty-hint {
        color: #888;
        margin-top: 40px;
        font-size: 15px;
      }
      footer {
        margin-top: 18px;
        color: #666;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h2>座位安排</h2>

    <div class="import-bar">
      <label
        >导入 Excel
        <input type="file" id="xlsxInput" accept=".xlsx,.xls" />
      </label>
      <label
        >导入 JSON
        <input type="file" id="jsonInput" accept=".json" />
      </label>
      <a
        id="tplLink"
        href="/Users/yuk/Desktop/project/yukuai123.github.io/template.xlsx"
        download
        style="
          padding: 8px 14px;
          border-radius: 6px;
          background: #888;
          color: #fff;
          text-decoration: none;
          font-size: 14px;
        "
        >下载 Excel 模板</a
      >
    </div>

    <input id="title-input" value="座位表" placeholder="班级名称" />

    <div class="toolbar" id="toolbar" style="display: none">
      <button id="saveBtn">保存到本地</button>
      <button id="clearBtn" class="secondary">清除并恢复导入初始</button>
      <button id="exportBtn" class="secondary">导出 JSON</button>
    </div>

    <div class="classroom" id="classroom">
      <div id="empty-hint">请先导入 Excel 或 JSON 文件</div>
    </div>

    <footer>拖拽移动位置；标签可添加/删除；保存到 localStorage。</footer>

    <script>
      let groups = [];
      let initialGroups = [];
      const STORAGE_KEY = "seatImportData";

      // ── 导入 Excel ──────────────────────────────────────────
      document.getElementById("xlsxInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const wb = XLSX.read(ev.target.result, { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
          const students = rows
            .filter((r) => r["姓名"] && String(r["姓名"]).trim())
            .map((r, i) => ({
              id: "s" + Date.now() + "_" + i,
              name: String(r["姓名"]).trim(),
              sex: normSex(r["性别"]),
              height: r["身高"] ? String(r["身高"]) : "",
              tag: [],
            }));
          if (!students.length) {
            alert("未找到有效学生数据（需含'姓名'列）");
            return;
          }
          loadStudents(students);
          document.getElementById("title-input").value = file.name.replace(
            /\.[^.]+$/,
            "",
          );
        };
        reader.readAsArrayBuffer(file);
        e.target.value = "";
      });

      function normSex(v) {
        if (!v) return "";
        const s = String(v).trim();
        if (s === "男" || s.toLowerCase() === "male") return "male";
        if (s === "女" || s.toLowerCase() === "female") return "female";
        return "";
      }

      // ── 导入 JSON ───────────────────────────────────────────
      document.getElementById("jsonInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            // 支持两种格式：分组数组 [{name,students}] 或学生数组 [{name,...}]
            if (Array.isArray(data) && data[0] && data[0].students) {
              groups = data;
              initialGroups = JSON.parse(JSON.stringify(data));
            } else if (Array.isArray(data) && data[0] && data[0].name) {
              loadStudents(
                data.map((s, i) => ({
                  id: s.id || "s_" + i,
                  name: s.name,
                  sex: normSex(s.sex),
                  height: s.height || "",
                  tag: s.tag || [],
                })),
              );
            } else {
              alert("JSON 格式不支持");
              return;
            }
            document.getElementById("title-input").value = file.name.replace(
              /\.[^.]+$/,
              "",
            );
            render();
            document.getElementById("toolbar").style.display = "";
          } catch {
            alert("JSON 解析失败");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      });

      // ── 分组逻辑：平均分4组 ─────────────────────────────────
      function loadStudents(students) {
        const n = students.length;
        const base = Math.floor(n / 4);
        const extra = n % 4;
        groups = [];
        let idx = 0;
        for (let g = 0; g < 4; g++) {
          const count = base + (g < extra ? 1 : 0);
          groups.push({
            name: "第" + ["一", "二", "三", "四"][g] + "组",
            students: students.slice(idx, idx + count),
          });
          idx += count;
        }
        initialGroups = JSON.parse(JSON.stringify(groups));
        render();
        document.getElementById("toolbar").style.display = "";
      }

      // ── 渲染 ────────────────────────────────────────────────
      const classroom = document.getElementById("classroom");

      function render() {
        classroom.innerHTML = "";
        groups.forEach((group) => {
          const gEl = document.createElement("div");
          gEl.className = "group";
          const title = document.createElement("div");
          title.className = "group-title";
          title.textContent = group.name;
          gEl.appendChild(title);
          const grid = document.createElement("div");
          grid.className = "grid";
          group.students.forEach((stu) => {
            const stuEl = document.createElement("div");
            stuEl.className =
              "student" +
              (stu.sex === "male"
                ? " male"
                : stu.sex === "female"
                  ? " female"
                  : "");
            stuEl.draggable = true;
            stuEl.dataset.id = stu.id;
            const sub = [stu.height ? stu.height + "cm" : ""]
              .filter(Boolean)
              .join(" ");
            const info = document.createElement("div");
            info.className = "info";
            info.innerHTML =
              stu.name + (sub ? `<div class="sub">${sub}</div>` : "");
            const tagContainer = document.createElement("div");
            tagContainer.className = "tag-container";
            (stu.tag || []).forEach((t, idx) =>
              tagContainer.appendChild(createTagEl(stu, t, idx)),
            );
            const input = document.createElement("input");
            input.className = "tag-input";
            input.placeholder = "添加标签";
            input.addEventListener("keydown", (e) => {
              if (e.key !== "Enter") return;
              e.preventDefault();
              const val = input.value.trim();
              if (!val) return;
              if ((stu.tag || []).length >= 5) {
                alert("最多5个标签");
                input.value = "";
                return;
              }
              if (!stu.tag) stu.tag = [];
              stu.tag.push(val);
              tagContainer.insertBefore(
                createTagEl(stu, val, stu.tag.length - 1),
                input,
              );
              input.value = "";
            });
            tagContainer.appendChild(input);
            stuEl.addEventListener("dragstart", (e) => {
              e.dataTransfer.setData("text/plain", stu.id);
              stuEl.classList.add("dragging");
            });
            stuEl.addEventListener("dragend", () => {
              stuEl.classList.remove("dragging");
              document
                .querySelectorAll(".over")
                .forEach((el) => el.classList.remove("over"));
            });
            stuEl.addEventListener("dragover", (e) => {
              e.preventDefault();
              stuEl.classList.add("over");
            });
            stuEl.addEventListener("dragleave", () =>
              stuEl.classList.remove("over"),
            );
            stuEl.addEventListener("drop", (e) => {
              e.preventDefault();
              stuEl.classList.remove("over");
              const fromId = e.dataTransfer.getData("text/plain");
              if (fromId && fromId !== stu.id) {
                moveBeforeStudent(fromId, stu.id);
                render();
              }
            });
            stuEl.appendChild(info);
            stuEl.appendChild(tagContainer);
            grid.appendChild(stuEl);
          });
          gEl.appendChild(grid);
          gEl.addEventListener("dragover", (e) => {
            e.preventDefault();
            gEl.classList.add("over");
          });
          gEl.addEventListener("dragleave", (e) => {
            if (!gEl.contains(e.relatedTarget)) gEl.classList.remove("over");
          });
          gEl.addEventListener("drop", (e) => {
            gEl.classList.remove("over");
            if (e.target.closest(".student")) return;
            const fromId = e.dataTransfer.getData("text/plain");
            if (fromId) {
              moveToGroup(fromId, group.name);
              render();
            }
          });
          classroom.appendChild(gEl);
        });
      }

      function createTagEl(stu, val, idx) {
        const tEl = document.createElement("div");
        tEl.className = "tag-item";
        tEl.innerText = val;
        const rm = document.createElement("span");
        rm.className = "remove";
        rm.innerText = "×";
        rm.addEventListener("click", () => {
          stu.tag.splice(idx, 1);
          render();
        });
        tEl.appendChild(rm);
        return tEl;
      }

      function findPos(id) {
        for (let gi = 0; gi < groups.length; gi++)
          for (let si = 0; si < groups[gi].students.length; si++)
            if (groups[gi].students[si].id === id) return { gi, si };
        return null;
      }

      function moveBeforeStudent(fromId, toId) {
        const from = findPos(fromId),
          to = findPos(toId);
        if (!from || !to) return;
        const [stu] = groups[from.gi].students.splice(from.si, 1);
        const newTo = findPos(toId);
        groups[newTo.gi].students.splice(newTo.si, 0, stu);
      }

      function moveToGroup(fromId, groupName) {
        const from = findPos(fromId);
        if (!from) return;
        const toGi = groups.findIndex((g) => g.name === groupName);
        if (toGi === -1 || toGi === from.gi) return;
        const [stu] = groups[from.gi].students.splice(from.si, 1);
        groups[toGi].students.push(stu);
      }

      // ── 工具栏 ──────────────────────────────────────────────
      document.getElementById("saveBtn").addEventListener("click", () => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(groups));
        alert("已保存");
      });
      document.getElementById("clearBtn").addEventListener("click", () => {
        if (!confirm("确认恢复导入时的初始排列？")) return;
        groups = JSON.parse(JSON.stringify(initialGroups));
        render();
      });
      document.getElementById("exportBtn").addEventListener("click", () => {
        const title = document.getElementById("title-input").value || "座位";
        const blob = new Blob([JSON.stringify(groups, null, 2)], {
          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = title + ".json";
        a.click();
      });

      // 尝试恢复上次保存
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          groups = JSON.parse(saved);
          initialGroups = JSON.parse(JSON.stringify(groups));
          render();
          document.getElementById("toolbar").style.display = "";
        } catch {}
      }
    </script>
  </body>
</html>
